body:
  text: 南天竺沙門蒙潤排定科天台四教儀二初總題二初正立題天台二抄錄人高麗二別文三初敘時教法義散廣二初正敘二初能立教主天台二所用判釋二初總標以五二別列二初五時言五二八教二初正列言八二喻顯頓等二廣結如是二依廣本撮錄綱要二初標所依今依二示綱要二初總約五時正釋教相二初分章初辨二牒釋二初化儀四教二初正釋三初四時次第二初列釋四儀四初頓教三初總標第一二別釋三初約部教三初部所謂二教二初機教兼權若約二雙示二初圓謂初二別處處三雙結故約二約時此約三約味涅槃三引證二初引經徵起法華二答釋所領答諸二漸教三初總標第二二別釋三初鹿苑四初約部教二初於頓開漸二初對機示處次為二約喻顯身脫舍二正施藏經二初埀世成道示從二正明施教初在二約時若約三約味若約四引證二初引經徵起信解二答釋答次二方等四初約部教二初部次明二教四教二約時若約三約味若約四引證二初引經徵起信解二答釋答三三般若四初約部教二初部次說二教此般二約時約時三約味約味四引證二初引經徵起信解二答釋答明三總結已上三秘密教四不定教二結齊四時化儀二第五開顯三料揀時昧二結前生後上來二化法四教二別約化法略明行法三結抄略指廣示異三秘密教三初標第三二釋如前三結故言四不定教二初正明三一初標第四二釋亦由三結如是二雙結然秘二第五開顯二初法華四初開顯二初正明三初總明部教今昔權實二初開權顯實次說二權實名通言權二別列所開昔日權實二初總指頓漸隔異謂法二別列昔日麤妙二初頓部二初隔異非本懷如華二麤法須開顯所以二三漸次鹿三別示能開今經獨妙二初開昔部二初開偏麤成妙來至二開昔圓成妙二初本融故妙諸味二隔偏故麤但是二顯今部二初能開得名獨得二引證純一故文二斥非時人二約時約時三約味約味四引證二初引經徵起信解二答釋答即二涅槃二涅槃四初示意二初雙標次說二雙釋二初捃拾殘機一為二逗留末代二為二同異三初時味論同然若二部有小異論其三引當經證故文三時合前法四料揀二初問問此二答答名三料揀時味二初問問將二答二初標答有二釋二初約相生三初標一者二釋所謂三結故譬二約取濃淡三初下根三初標二者二釋此則三結此約二中根其次三上根其上二化法四教四初藏教三初標第一二釋二初教法二初示名義四初列名一修二揀取此之二引證大智四准判依此二教所被機二初通標三乘此有二且示聲聞三初辨四諦二初通標初聲二別釋四初苦諦三初牒通言四二釋別二初開總出別二初標名體一苦二列名數言二二揀別成總二初總示別則二別釋二初六道六初地獄道一地二畜生道二畜三餓鬼道三餓四修羅道四阿五人道五人六天道六天二生死上來三結名此是二集諦三初總標名體二初牒名示體二集二名異體同又云二別釋見思二初見惑三初標名列使二初通標名數初釋二別列十使所謂二約界釋成二初通示此十二別名二初欲界謂二上界上三結成其名二界二思惑三初牒名示數二明二約界釋體二初通示九地謂二約界釋成二初欲界欲界二上界上八三結成其名故成三總結成名上來三滅諦三初牒名二滅二示體滅前三揀非因滅四道諦三初牒名四道二示體二初標廣略略則二別釋廣二初標科此三二列釋一四三結歸已上二四諦通大如然三四諦因果二行位三結略明二通教三別教四圓教三四諦因果二初正示然四二料揀二初問問何二答答聲二行位三初通標略明二別釋三初聲聞三初標位分料初明二釋所稟法二初凡三初外凡二初標釋外二釋三初五停心初五二別相念二別三總相念二總二內凡二明三結名上來二聖二初標次明二釋三初見道一須二修道二初二果二斯二三果三三無學四阿三結略明二支佛三初雙標次明二別釋二初緣覺稟法四初正明所稟值佛二諦緣開合三初標與前二徵釋云何三重釋既明三正示境觀二初順推境緣覺二順推觀若滅四結因觀二獨覺自觀言獨三同異二初二種自揀兩二對聲聞揀二初斷正同此人二侵習異更侵三菩薩二初能稟所稟次二釋所稟法二初修行二初發願一未二修行二初結前生後既二正明修行二初總標於三二別釋三初三祇行行二初總牒言三二示相三初初祗從古二二祗次從三三祗次從二百劫種相二初結前生後經二別示福相福三六度滿相二初總牒修行二示相如尸二成道四初五相次入二第六發直三第七受梵四第八住世三總結上來二通教三初標次明二釋四初釋名二初前後通前二當教又從二釋位二初當教四初總標依大二細釋二初九地一乾二佛地三初成佛十佛二說法為三三涅槃緣盡三引證經云四同異此經二前後二初標然於二釋二初鈍根通前鈍根二利根通後二初正釋若利二揀位二初問問何二答二初通定三根答二入位真似所接三揀藏通二初問問此二答二初許所問答誡二正答同異二初雖同而異然二別釋異義二初藏小拙藏二通大巧二初正釋通教二揀位二初問問教二答答未四所屬文般若三結界明三別教三初標次明二釋三初略辨名義二初正釋此教二引證涅槃二正列位行二初總指諸天二別列二初總列諸經二初正列華嚴二辨意如是二別依瓔珞二初分科二初准經然位二分科以五二細釋二初凡二初外凡初言二內凡三初十住次明二十行次明三十迴向次明二聖二初因二初十地次明二等覺更斷二果二初成佛更破二說法為鈍三別示隨機三初正明隨機三初點示教道有經二借別名通有處三借別名圓有云三勸審斷證如此三結略明四圓教三初標次明二釋二初明用二初名義圓明二功用所謂二位次二初總指諸大二別釋二初位次二初通列諸經二初列法華二結如是二別依二經二初標今且二釋二初凡二初外凡三初牒初五二釋五初隨喜品二初標一隨二釋二初正行二初引經經云二徵釋二初徵問隨二釋三初總答答妙二別釋二初約所隨立妙解二初心法三初示心體妙法者二示體德妙心三喻顯如如二生佛心佛二約能隨立妙行三初標境觀此心二境智俱亡常境三境智俱立無緣三結示初心二助行三初結前生後內以二正釋二初總標言五二雙釋二初理懺理懺二事懺二初正明五初懺悔二初正釋三初法二初首罪言事二能助若如二喻如順三合修圓二斥非二初總斥莫見二別斥二初無因有果斥何處二舉謬執法斥二初舉執計二初舉所執法若才二舉能計情十方二約教斥二初判屬理即今雖二重斥所計我等二勸請二勸三隨喜三隨四迴向四回五發願五願二結是為三例後下去二讀誦品二初標二讀二釋三初引經經云二釋意謂內三喻顯如膏三說法品二初標三說二釋二初引經經云二釋意內解四兼行六度品二初標四兼二釋二初引經經云二釋意福德五正行六度品二初標五正二釋二初引經經云二釋意謂自三結位對別此五二內凡二聖二六即三結二內凡二初總標次進二別釋二初七信二初正釋二初初信初信二後六次從二引證二初仁王二初引故仁二釋二初正釋二初正解十善解曰二正釋信若別二本期三初正明然圓二喻顯然譬三合圓教二永嘉二初引永嘉二釋二初同齊解曰二伏劣言若二三信次從二聖二初因位三初十住二初初住三初正釋二初內證次入二外化現身二引證二初引經華嚴二解釋二初始成二初正釋二初正釋解曰二斥謬三初以因為果謂成二引救重詰若言三引文勸審雖有二引同龍女二三身慧身三結成中觀二九住次從二行向地三等覺二果位二行向地二初二行三初明二行與別同次入二明後位與別異從三三釋同所以二初以因為果故以二因果所以三初所以只緣二喻顯譬如三結同故權二三行至十地次從三等覺更破二果位二初位成智斷進破二座身土圓以虛二六即四初略明所以然圓二正判位斥謂一三重釋二字約修四誡勸是故三結略明二別約化法略明行法二初總明法被四機然依二從略述一種二初方便三初科文言二二牒釋五初具五緣五初持戒清淨初明二衣食具足二衣三閑居靜處三閑四息諸緣務四息五近善知識五近二訶五欲五初訶色第二二訶聲二訶三訶香三訶四訶味四訶五訶觸五訶三棄五蓋第三四調五事第四五行五法五初欲第五二精進二精三念三念四巧慧四巧五一心五一三結意二正修二初總標法被四機次明二別明圓教十初勸不思議境一觀二發菩提心二真三善巧安止三善四破法徧四破五識通塞五識六調道品六道七對治助開七對八知位次八知九能安忍九能十離法愛十離三結意此二三結抄略指廣示異三初結抄略謹按二指廣若要三示諸家自從
