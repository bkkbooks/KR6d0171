body:
  text: 天台四教儀集注序天台四教儀者實教門之要道也自昔至今注釋者衆或略而不備或博而太繁矧又節去正文但標初後苟非精誦者莫之能閲也今集諸部之文注於其下將無便於披覽者歟其間一二與諸家有同異者蓋述所聞於先德非任胸臆也若夫文末正修初乘觀法文雖簡約理亦備焉諸新學人究心於茲忘言忘思筌俱擲奚以是為然能爾也則無適而不可亦豈離是云乎哉時元統甲戌夏五南天竺白蓮華沙門蒙潤謹序
